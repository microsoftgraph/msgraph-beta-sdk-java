version: 2
updates:
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: weekly
    time: "09:00" # 9am UTC
  open-pull-requests-limit: 10
  groups:
    kiota-dependencies:
      patterns:
        - "*kiota*"
    microsoft-graph:
      patterns:
        - "*microsoft-graph*"
    junit-dependencies:
      patterns:
        - "*junit*"
    open-telemetry:
      patterns:
        - "*opentelemetry*"
- package-ecosystem: gradle
  directory: "/android"
  schedule:
    interval: weekly
    time: "09:00" # 9am UTC
  open-pull-requests-limit: 10
  groups:
    android-build-tools:
      patterns:
        - "*android*"
        - "*gradle-enterprise*"
        - "*gradle-util*"
        - "*gradle-versions*"
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    all-actions:
      patterns:
        - "*"

